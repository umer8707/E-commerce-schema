name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install static analysis tools
        run: pip install flake8 mypy bandit
      - name: Run flake8
        run: flake8 . --max-line-length=120 --exclude=__pycache__,.git,tests
      - name: Run mypy
        run: mypy . --ignore-missing-imports --exclude tests
      - name: Run bandit
        run: bandit -r . --exclude ./.git,./tests,./seed.py

  test:
    name: Run Tests
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pytest with coverage
        run: pytest tests/ -v --tb=short --cov=. --cov-report=xml:coverage.xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  sonar:
    name: SonarQube Scan
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - uses: SonarSource/sonarqube-scan-action@v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push green image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-cart:green
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-cart:latest

  deploy:
    name: Blue-Green Deploy to Azure Container Apps
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Enable multiple revision mode
        run: |
          az containerapp revision set-mode \
            --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --mode multiple

      - name: Deploy green revision (0% traffic)
        id: deploy_green
        run: |
          SUFFIX="green-${{ github.run_number }}"
          az containerapp update \
            --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.DOCKER_USERNAME }}/ecommerce-cart:green \
            --revision-suffix $SUFFIX
          echo "REVISION_NAME=${{ secrets.AZURE_CONTAINER_APP_NAME }}--$SUFFIX" >> $GITHUB_ENV

      - name: Health check green revision
        id: health_check
        run: |
          GREEN_URL="https://${{ env.REVISION_NAME }}.redflower-743b2e51.southeastasia.azurecontainerapps.io/health"
          echo "Health checking: $GREEN_URL"
          sleep 30
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$GREEN_URL")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Promote green to 100% traffic
        if: success()
        run: |
          az containerapp ingress traffic set \
            --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --revision-weight "${{ env.REVISION_NAME }}=100"
          echo "Green promoted — serving 100% traffic"

      - name: Rollback — deactivate green on failure
        if: failure() && steps.health_check.outcome == 'failure'
        run: |
          az containerapp revision deactivate \
            --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --revision "${{ env.REVISION_NAME }}"
          echo "Health check failed — green deactivated, blue still serving 100%"
